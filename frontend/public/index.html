<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="Qarzlarni oson va qulay boshqaring" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Do'kon Qarz" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icons (emoji fallback orqali SVG ishlatamiz) -->
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <title>Do'kon Qarz — Qarzlarni boshqarish tizimi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>JavaScript yoqilishi kerak.</noscript>
    <div id="root"></div>

    <!-- PWA Service Worker ro'yxatdan o'tkazish -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            console.log('✅ SW registered:', reg.scope);
          }).catch(function(err) {
            console.log('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
